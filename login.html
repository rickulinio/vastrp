<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Logowanie na VAST RP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  
  <script src="js/auth.js" defer></script>
  <script src="js/main.js"></script>
  
</head>
  <link rel="icon" type="image/png" sizes="500x500" href="img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="500x500" href="img/favicon16.png">
<body class="auth-page">

<!-- BACKGROUND -->
<div class="cursor-glow"></div>

<div class="hero-bg">
  <div class="grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <canvas id="particles"></canvas>
</div>

<!-- LOGIN WRAPPER -->
<div class="auth-wrapper">

  <div class="login-box cinematic">

    <img src="img/logo.png" class="auth-logo" alt="Vast Roleplay">

    <!-- LOGIN BUTTON -->
    <a id="loginBtn" class="btn">
      Zaloguj przez Discord
    </a>

    <!-- USER INFO -->
    <div id="user" class="user-box"></div>

  </div>

</div>
</body>
</html>
