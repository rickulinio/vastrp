<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Zarządzania</title>
    <script src="config.js"></script>
</head>
<body style="background: #0a0a0a; color: white;">

    <div class="container">
        <h1>Panel Zarządzania</h1>
        <div id="controls"></div>
        <a href="index.html">Wróć do strony głównej</a>
    </div>

    <script>
        // 1. Sprawdzanie czy użytkownik jest adminem
        const userData = localStorage.getItem("user");
        const user = userData ? JSON.parse(userData) : null;

        if (!user || !CONFIG.admins[user.id]) {
            alert("Nie masz uprawnień!");
            window.location.href = "index.html";
        }

        // 2. Logika wyświetlania przycisków
        const controls = document.getElementById("controls");
        const myRoles = CONFIG.admins[user.id];

        function renderControls() {
            controls.innerHTML = '';
            Object.keys(CONFIG.factions).forEach(key => {
                // Jeśli admin ma rolę przypisaną do danej frakcji
                if (myRoles.includes(key)) {
                    const f = CONFIG.factions[key];
                    const btn = document.createElement("button");
                    btn.innerHTML = `${f.name}: ${f.status ? "OTWARTE" : "ZAMKNIĘTE"}`;
                    btn.style.backgroundColor = f.status ? "green" : "red";
                    btn.style.padding = "10px";
                    btn.style.margin = "5px";
                    
                    btn.onclick = () => {
                        f.status = !f.status; // Zmiana w pamięci przeglądarki
                        renderControls();     // Odświeżenie przycisków
                    };
                    controls.appendChild(btn);
                }
            });
        }

        renderControls();
    </script>
</body>
</html>
